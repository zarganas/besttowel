<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GENÇEFENDİ - Sayı 1 | Mart 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-red: #E31E24;
            --dark-red: #B91C1C;
            --chp-red: #E31E24;
            --white: #FFFFFF;
            --black: #1A1A1A;
            --gray: #6B7280;
            --light-gray: #F3F4F6;
            --cream: #FDF8F3;
            --gold: #D4AF37;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        .book-container {
            perspective: 2000px;
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
        }

        .book {
            position: relative;
            width: 100%;
            aspect-ratio: 1.4;
            transform-style: preserve-3d;
        }

        .page {
            position: absolute;
            width: 50%;
            height: 100%;
            top: 0;
            background: var(--white);
            transform-origin: left center;
            transform-style: preserve-3d;
            transition: transform 0.6s cubic-bezier(0.645, 0.045, 0.355, 1);
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
            overflow: hidden;
        }

        .page.right {
            left: 50%;
            transform-origin: right center;
            border-left: 1px solid #e5e5e5;
        }

        .page.flipped {
            transform: rotateY(-180deg);
        }

        .page.right.flipped {
            transform: rotateY(180deg);
        }

        .page-content {
            position: absolute;
            width: 100%;
            height: 100%;
            padding: 30px;
            backface-visibility: hidden;
            overflow-y: auto;
        }

        .page-back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            transform: rotateY(180deg);
            background: var(--white);
        }

        /* Kapak Tasarımı */
        .cover-front {
            background: linear-gradient(135deg, var(--primary-red) 0%, var(--dark-red) 100%);
            color: var(--white);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 40px;
        }

        .cover-front h1 {
            font-family: 'Playfair Display', serif;
            font-size: 4rem;
            font-weight: 900;
            letter-spacing: 0.1em;
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .cover-front .subtitle {
            font-size: 1.2rem;
            letter-spacing: 0.3em;
            margin-bottom: 40px;
            opacity: 0.9;
        }

        .cover-front .issue-info {
            font-size: 1rem;
            letter-spacing: 0.2em;
            margin-top: 60px;
            padding: 15px 30px;
            border: 2px solid rgba(255,255,255,0.3);
        }

        .cover-back {
            background: var(--black);
            color: var(--white);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px;
        }

        .cover-back h2 {
            font-family: 'Playfair Display', serif;
            font-size: 2rem;
            margin-bottom: 30px;
            color: var(--gold);
        }

        .team-list {
            text-align: center;
            line-height: 2;
            font-size: 0.9rem;
        }

        /* İçerik Sayfaları */
        .content-page {
            background: var(--cream);
        }

        .page-header {
            border-bottom: 3px solid var(--primary-red);
            padding-bottom: 15px;
            margin-bottom: 25px;
        }

        .page-header h2 {
            font-family: 'Playfair Display', serif;
            font-size: 1.8rem;
            color: var(--black);
            margin-bottom: 5px;
        }

        .page-header .author {
            color: var(--gray);
            font-size: 0.9rem;
            font-weight: 500;
        }

        .article-content {
            font-size: 0.95rem;
            line-height: 1.8;
            color: var(--black);
            text-align: justify;
        }

        .article-content p {
            margin-bottom: 15px;
            text-indent: 20px;
        }

        .article-content p:first-child {
            text-indent: 0;
        }

        .article-content p:first-child::first-letter {
            font-family: 'Playfair Display', serif;
            font-size: 3rem;
            float: left;
            line-height: 1;
            padding-right: 10px;
            color: var(--primary-red);
        }

        /* İçindekiler */
        .toc-page {
            background: var(--white);
        }

        .toc-title {
            font-family: 'Playfair Display', serif;
            font-size: 2.5rem;
            color: var(--primary-red);
            text-align: center;
            margin-bottom: 40px;
            border-bottom: 2px solid var(--primary-red);
            padding-bottom: 15px;
        }

        .toc-item {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            padding: 12px 0;
            border-bottom: 1px dotted var(--gray);
            cursor: pointer;
            transition: all 0.3s;
        }

        .toc-item:hover {
            color: var(--primary-red);
            padding-left: 10px;
        }

        .toc-item .title {
            font-weight: 600;
            font-size: 1rem;
        }

        .toc-item .author {
            font-size: 0.85rem;
            color: var(--gray);
            font-style: italic;
        }

        .toc-item .page-num {
            font-weight: 700;
            color: var(--primary-red);
        }

        /* Alıntı Kutuları */
        .quote-box {
            background: linear-gradient(135deg, var(--primary-red), var(--dark-red));
            color: var(--white);
            padding: 25px;
            margin: 25px 0;
            border-radius: 8px;
            font-style: italic;
            position: relative;
        }

        .quote-box::before {
            content: '"';
            font-family: 'Playfair Display', serif;
            font-size: 4rem;
            position: absolute;
            top: -10px;
            left: 10px;
            opacity: 0.3;
        }

        .quote-box p {
            text-indent: 0 !important;
            margin: 0;
            padding-left: 30px;
        }

        /* Navigasyon */
        .controls {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 30px;
            flex-wrap: wrap;
        }

        .btn {
            background: var(--primary-red);
            color: var(--white);
            border: none;
            padding: 12px 25px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 0.95rem;
            font-weight: 600;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn:hover {
            background: var(--dark-red);
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(227, 30, 36, 0.4);
        }

        .btn:disabled {
            background: var(--gray);
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .page-indicator {
            background: rgba(255,255,255,0.1);
            color: var(--white);
            padding: 12px 25px;
            border-radius: 30px;
            font-weight: 600;
        }

        /* Bölüm Başlıkları */
        .section-divider {
            background: var(--black);
            color: var(--white);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 40px;
        }

        .section-divider h2 {
            font-family: 'Playfair Display', serif;
            font-size: 2.2rem;
            margin-bottom: 20px;
        }

        .section-divider .section-icon {
            font-size: 3rem;
            margin-bottom: 20px;
        }

        /* Mobil Uyum */
        @media (max-width: 768px) {
            .book {
                aspect-ratio: 0.7;
            }

            .page {
                width: 100%;
                left: 0;
            }

            .page.right {
                left: 0;
                display: none;
            }

            .page.right.active {
                display: block;
            }

            .cover-front h1 {
                font-size: 2.5rem;
            }

            .page-content {
                padding: 20px;
            }

            .article-content {
                font-size: 0.9rem;
            }
        }

        /* Özel Sayfa Tasarımları */
        .poem-page {
            background: linear-gradient(180deg, var(--cream) 0%, #fff 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .poem-page .poem-text {
            font-family: 'Playfair Display', serif;
            font-size: 1.3rem;
            line-height: 2.2;
            color: var(--black);
            max-width: 80%;
        }

        .poem-page .poem-author {
            margin-top: 30px;
            color: var(--gray);
            font-style: italic;
        }

        /* Bulmaca Sayfası */
        .puzzle-page {
            background: var(--white);
        }

        .puzzle-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin-top: 20px;
        }

        .puzzle-section h4 {
            color: var(--primary-red);
            margin-bottom: 10px;
            font-size: 1rem;
        }

        .puzzle-clue {
            font-size: 0.85rem;
            line-height: 1.6;
            margin-bottom: 8px;
            padding-left: 15px;
            position: relative;
        }

        .puzzle-clue::before {
            content: attr(data-num);
            position: absolute;
            left: 0;
            color: var(--primary-red);
            font-weight: bold;
        }

        /* Anma Sayfası */
        .memorial-page {
            background: linear-gradient(180deg, #1a1a2e 0%, #2d2d44 100%);
            color: var(--white);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .memorial-page h2 {
            font-family: 'Playfair Display', serif;
            font-size: 2rem;
            margin-bottom: 30px;
            color: var(--gold);
        }

        .memorial-page .candle {
            font-size: 4rem;
            margin-bottom: 30px;
            animation: flicker 2s infinite;
        }

        @keyframes flicker {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        .memorial-page p {
            font-size: 1.1rem;
            line-height: 2;
            max-width: 80%;
        }

        /* Bilgi Kutuları */
        .info-box {
            background: var(--light-gray);
            border-left: 4px solid var(--primary-red);
            padding: 20px;
            margin: 20px 0;
        }

        .info-box h4 {
            color: var(--primary-red);
            margin-bottom: 10px;
        }

        .info-box ul {
            list-style: none;
            padding: 0;
        }

        .info-box li {
            padding: 8px 0;
            padding-left: 20px;
            position: relative;
            font-size: 0.9rem;
        }

        .info-box li::before {
            content: '▸';
            position: absolute;
            left: 0;
            color: var(--primary-red);
        }

        /* Scrollbar */
        .page-content::-webkit-scrollbar {
            width: 6px;
        }

        .page-content::-webkit-scrollbar-track {
            background: #f1f1f1;
        }

        .page-content::-webkit-scrollbar-thumb {
            background: var(--primary-red);
            border-radius: 3px;
        }

        /* Hukuk Köşesi Özel */
        .legal-tips {
            background: #1a1a2e;
            color: var(--white);
            padding: 20px;
            border-radius: 8px;
            margin: 20px 0;
        }

        .legal-tips h4 {
            color: var(--gold);
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .legal-tips ul {
            list-style: none;
            padding: 0;
        }

        .legal-tips li {
            padding: 10px 0;
            padding-left: 25px;
            position: relative;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .legal-tips li::before {
            content: '⚖';
            position: absolute;
            left: 0;
        }
    </style>
</head>

                    <div class="puzzle-grid">
                        <div class="puzzle-section">
                            <h4>YATAY</h4>
                            <div class="puzzle-clue" data-num="5.">CHP Gençlik Kolları'nın ilk genel başkanı olarak görev yapmıştır.</div>
                            <div class="puzzle-clue" data-num="7.">Yerel mahkeme olarak Anayasa Mahkemesi kararını uygulamayan ilk hakimin görev yaptığı bakanlık.</div>
                            <div class="puzzle-clue" data-num="8.">Ülkeler veya şehirler arasında yapılan uzun yolculuk; seyahat.</div>
                        </div>
                        <div class="puzzle-section">
                            <h4>DİKEY</h4>
                            <div class="puzzle-clue" data-num="1.">24 Haziran 1920'de Aydın Cephesi bozulunca Yunanlılar...'ı işgal etmiştir.</div>
                            <div class="puzzle-clue" data-num="2.">5 Mayıs 1960 tarihinde, Ankara'da, Demokrat Parti aleyhtarı öğrencilerin yaptığı protesto eylemi.</div>
                            <div class="puzzle-clue" data-num="3.">Bakan eskisi.</div>
                            <div class="puzzle-clue" data-num="4.">Dünyanın en büyük "siyasi" hapishanelerinden biri.</div>
                            <div class="puzzle-clue" data-num="6.">Denizli'nin 616 tane... vardır.</div>
                        </div>
                    </div>
                `
            },
            {
                type: 'memorial-page',
                content: `
                    <div class="candle">🕯</div>
                    <h2>SENİ UNUTMAYACAĞIZ<br>NACİ AĞABEY...</h2>
                    <div class="poem-text" style="margin-top: 30px;">
                        Dağlarda tek tek ateşler yanıyordu.<br>
                        Ve yıldızlar öyle ışıltılı, öle ferahtılar ki<br>
                        şayak kalpaklı adam<br>
                        nasıl ve ne zaman geleceğini bilmeden<br>
                        güzel, rahat günlere inanıyordu...<br><br>
                        Yıldızlar yoldaşın olsun.<br>
                        Mehmet Ağabey...
                    </div>
                    <p style="margin-top: 40px; font-style: italic; opacity: 0.8;">
                        Özgürlüğün türküsünü demeye geleceğiz...
                    </p>
                `
            }
        ];

        let currentPage = 0;
        const totalPages = pages.length;

        function initBook() {
            const book = document.getElementById('book');
            
            pages.forEach((page, index) => {
                const pageEl = document.createElement('div');
                pageEl.className = `page ${index % 2 === 1 ? 'right' : ''}`;
                pageEl.id = `page-${index}`;
                pageEl.style.zIndex = totalPages - index;
                
                let contentHTML = '';
                
                if (page.type === 'cover-front' || page.type === 'cover-back' || 
                    page.type === 'section-divider' || page.type === 'memorial-page') {
                    contentHTML = `<div class="page-content ${page.type}">${page.content}</div>`;
                } else if (page.type === 'toc-page') {
                    contentHTML = `<div class="page-content toc-page">${page.content}</div>`;
                } else if (page.type === 'puzzle-page') {
                    contentHTML = `
                        <div class="page-content puzzle-page">
                            <div class="page-header">
                                <h2>${page.title}</h2>
                            </div>
                            ${page.content}
                        </div>
                    `;
                } else {
                    contentHTML = `
                        <div class="page-content content-page">
                            <div class="page-header">
                                <h2>${page.title}</h2>
                                <div class="author">${page.author}</div>
                            </div>
                            <div class="article-content">${page.content}</div>
                        </div>
                    `;
                }
                
                pageEl.innerHTML = contentHTML;
                book.appendChild(pageEl);
            });
            
            updateControls();
        }

        function nextPage() {
            if (currentPage < totalPages - 2) {
                const currentLeft = document.getElementById(`page-${currentPage}`);
                const currentRight = document.getElementById(`page-${currentPage + 1}`);
                
                if (currentLeft) currentLeft.classList.add('flipped');
                if (currentRight) currentRight.classList.add('flipped');
                
                currentPage += 2;
                updateControls();
            }
        }

        function prevPage() {
            if (currentPage >= 2) {
                currentPage -= 2;
                
                const prevLeft = document.getElementById(`page-${currentPage}`);
                const prevRight = document.getElementById(`page-${currentPage + 1}`);
                
                if (prevLeft) prevLeft.classList.remove('flipped');
                if (prevRight) prevRight.classList.remove('flipped');
                
                updateControls();
            }
        }

        function goToPage(pageNum) {
            // 0-indexed page numarasına çevir
            const targetPage = (pageNum - 1) * 2;
            
            // Tüm sayfaları sıfırla
            for (let i = 0; i < totalPages; i++) {
                const page = document.getElementById(`page-${i}`);
                if (page) {
                    if (i < targetPage) {
                        page.classList.add('flipped');
                    } else {
                        page.classList.remove('flipped');
                    }
                }
            }
            
            currentPage = targetPage;
            updateControls();
        }

        function updateControls() {
            document.getElementById('pageIndicator').textContent = 
                `${Math.floor(currentPage / 2) + 1} / ${Math.ceil(totalPages / 2)}`;
            
            document.getElementById('prevBtn').disabled = currentPage === 0;
            document.getElementById('nextBtn').disabled = currentPage >= totalPages - 2;
        }

        // Klavye navigasyonu
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowRight') nextPage();
            if (e.key === 'ArrowLeft') prevPage();
        });

        // Dokunmatik navigasyon
        let touchStartX = 0;
        document.addEventListener('touchstart', (e) => {
            touchStartX = e.touches[0].clientX;
        });

        document.addEventListener('touchend', (e) => {
            const touchEndX = e.changedTouches[0].clientX;
            const diff = touchStartX - touchEndX;
            
            if (Math.abs(diff) > 50) {
                if (diff > 0) nextPage();
                else prevPage();
            }
        });

        // Kitabı başlat
        initBook();
    </script>
</body>
</html>
